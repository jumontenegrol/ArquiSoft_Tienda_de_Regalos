<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrito - Boutique de Regalos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Lexend', sans-serif; }
    .font-alfa { font-family: 'Alfa Slab One', cursive; }
  </style>
</head>
<body class="bg-pink-50 text-gray-800">

  <header class="bg-yellow-400 text-white text-center py-6 shadow-md relative">
    <a href="index.html"
      class="absolute left-6 top-1/2 -translate-y-1/2 bg-white text-yellow-500 px-4 py-2 rounded-lg shadow hover:bg-yellow-50">
      ← Volver
    </a>
    <h1 class="text-3xl font-alfa">Tu Carrito 🛒</h1>
    <p class="text-lg">Boutique de Regalos Villapinzón</p>
  </header>

  <main class="max-w-2xl mx-auto p-6">
    <div id="carritoContainer"></div>

    <button id="finalizarCompra"
      class="w-full mt-6 bg-green-500 hover:bg-green-600 text-white text-lg font-semibold px-6 py-4 rounded-xl shadow-lg transition">
      Finalizar compra 🎉
    </button>
  </main>

  <footer class="bg-yellow-400 text-center py-4 mt-10 text-sm text-white">
    <p>Contáctanos por 
      <a href="https://wa.me/573005554942" class="text-green-700 font-semibold hover:underline">WhatsApp</a>
    </p>
  </footer>

  <script src="carrito.js"></script>
</body>
</html>
