services:

  coordinator:
    build:
      context: ./coordinator
      dockerfile: Dockerfile.coordinator
    ports:
      - "80:8080"
    environment:
      - PRIMARY_URL=http://nginx-lb:80
      - SECONDARY_URL=http://nginx-lb-spare:80
      - PORT=8080
    depends_on:
      - nginx-lb
      - nginx-lb-spare
    networks:
      - public-network

  nginx-lb:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-gateway-1
      - api-gateway-2
      - api-gateway-3
    networks:
      - public-network

  nginx-lb-spare:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-gateway-1
      - api-gateway-2
      - api-gateway-3
    networks:
      - public-network

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000" # API S3
      - "9001:9001" # Consola web
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - public-network

  api-gateway-1:
    build: ./api-gateway
    environment:
      - PRODUCT_SERVICE_URL=http://product-service:4000
      - ORDER_SERVICE_URL=http://order-service:5000
      - REVIEW_SERVICE_URL=http://review-service:6000
      - AUTH_SERVICE_URL=http://auth-service:8080
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq:5672
      - REDIS_URL=redis://redis:6379
    depends_on:
      - product-service
      - order-service
      - auth-service
      - rabbitmq
      - redis
    networks:
      - public-network
      - private-network

  api-gateway-2:
    build: ./api-gateway
    environment:
      - PRODUCT_SERVICE_URL=http://product-service:4000
      - ORDER_SERVICE_URL=http://order-service:5000
      - REVIEW_SERVICE_URL=http://review-service:6000
      - AUTH_SERVICE_URL=http://auth-service:8080
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq:5672
      - REDIS_URL=redis://redis:6379
    depends_on:
      - product-service
      - order-service
      - auth-service
      - rabbitmq
      - redis
    networks:
      - public-network
      - private-network

  api-gateway-3:
    build: ./api-gateway
    environment:
      - PRODUCT_SERVICE_URL=http://product-service:4000
      - ORDER_SERVICE_URL=http://order-service:5000
      - REVIEW_SERVICE_URL=http://review-service:6000
      - AUTH_SERVICE_URL=http://auth-service:8080
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq:5672
      - REDIS_URL=redis://redis:6379
    depends_on:
      - product-service
      - order-service
      - auth-service
      - rabbitmq
      - redis
    networks:
      - public-network
      - private-network

  product-service:
    build: ./product-service
    depends_on:
      - postgres
    environment:
      - PORT=4000
      - DB_HOST=postgres
      - DB_USER=admin
      - DB_PASSWORD=admin
      - DB_NAME=giftshop
      - DB_PORT=5432
    networks:
      - private-network

  postgres:
    image: postgres:15
    container_name: products-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: giftshop
    volumes:
      - products_data:/var/lib/postgresql/data
    networks:
      - private-network

  order-service:
    build: ./order-service
    depends_on:
      - orders-postgres
      - rabbitmq
    environment:
      - DB_HOST=orders-postgres
      - DB_USER=admin
      - DB_PASSWORD=admin
      - DB_NAME=ordersdb
      - DB_PORT=5432
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq:5672
      - PORT=5000
    networks:
      - private-network

  orders-postgres:
    image: postgres:15
    container_name: orders-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: ordersdb
    volumes:
      - orders_data:/var/lib/postgresql/data
    networks:
      - private-network

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    environment:
      - API_URL=http://coordinator:8080
    depends_on:
      - coordinator
    networks:
      - public-network

  frontend-ssr:
    build:
      context: ./frontend-ssr
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:80
    ports:
      - "3001:3001"
    depends_on:
      - coordinator
    environment:
      - API_URL=http://coordinator:8080
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=admin123
      - MINIO_PUBLIC_URL=http://localhost:9000
    volumes:
      - ./frontend-ssr/public/uploads:/app/public/uploads
    networks:
      - public-network

  review-service:
    build: ./review-service
    depends_on:
      - mongo
    environment:
      - PORT=6000
      - MONGO_URI=mongodb://mongo:27017/reviewsdb
    networks:
      - private-network

  mongo:
    image: mongo:6
    container_name: reviews-mongo
    volumes:
      - reviews_data:/data/db
    networks:
      - private-network

  notification-service:
    build: ./notification-service
    ports:
      - "7000:7000"
    depends_on:
      - rabbitmq
      - redis
    environment:
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq:5672
      - REDIS_URL=redis://redis:6379
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
    networks:
      - private-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - private-network

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - private-network

  auth-service:
    build: ./auth-service
    container_name: auth-service
    depends_on:
      - auth-db
    environment:
      - PORT=8080
    networks:
      - private-network

  auth-db:
    image: postgres:15
    container_name: auth_db_container
    environment:
      POSTGRES_USER: user_auth
      POSTGRES_PASSWORD: password_segura
      POSTGRES_DB: auth_db
    volumes:
      - ./auth-service/databaseComponent/init.sql:/docker-entrypoint-initdb.d/init.sql
      - auth_data:/var/lib/postgresql/data
    networks:
      - private-network

# Network Segmentation
# public-network  → coordinator + nginx-lb + nginx-lb-spare + frontends + api-gateways
# private-network → microservicios + bases de datos
networks:
  public-network:
  private-network:

volumes:
  products_data:
  orders_data:
  reviews_data:
  rabbitmq_data:
  redis_data:
  auth_data:
  minio_data: