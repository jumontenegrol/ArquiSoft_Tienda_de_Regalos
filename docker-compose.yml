services:
  api-gateway:
    build: ./api-gateway
    ports:
      - "3000:3000"
    depends_on:
      - product-service
      - order-service
      - notification-service
    networks:
      - app-network

  product-service:
    build: ./product-service
    depends_on:
      - postgres
    networks:
      - app-network

  postgres:
    image: postgres:15
    container_name: products-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: giftshop
    volumes:
      - products_data:/var/lib/postgresql/data
    networks:
      - app-network

  order-service:
    build: ./order-service
    depends_on:
      - orders-postgres
      - rabbitmq
    networks:
      - app-network

  orders-postgres:
    image: postgres:15
    container_name: orders-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: ordersdb
    volumes:
      - orders_data:/var/lib/postgresql/data
    networks:
      - app-network

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - api-gateway
    networks:
      - app-network

  frontend-ssr:
    build: ./frontend-ssr
    ports:
      - "3001:3001"
    depends_on:
      - api-gateway
    networks:
      - app-network

  review-service:
    build: ./review-service
    depends_on:
      - mongo
    networks:
      - app-network

  mongo:
    image: mongo:6
    container_name: reviews-mongo
    volumes:
      - reviews_data:/data/db
    networks:
      - app-network

  notification-service:
    build: ./notification-service
    ports:
      - "7000:7000"
    depends_on:
      - rabbitmq
      - redis
    environment:
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq:5672
      - REDIS_URL=redis://redis:6379
    networks:
      - app-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"  # Panel web de RabbitMQ
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network

networks:
  app-network:

volumes:
  products_data:
  orders_data:
  reviews_data:
  rabbitmq_data:
  redis_data: