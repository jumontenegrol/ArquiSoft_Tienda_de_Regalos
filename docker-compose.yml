services:

  #HOT SPARE: Coordinator
  #Reemplaza al api-gateway como punto de entrada.
  coordinator:
    build:
      context: ./coordinator          
      dockerfile: Dockerfile.coordinator
    ports:
      - "8080:8080"
    environment:
      - PRIMARY_URL=http://api-gateway:3000
      - SECONDARY_URL=http://api-gateway-spare:3000
      - PORT=8080
    depends_on:
      - api-gateway
      - api-gateway-spare
    networks:
      - public-network
      - private-network

  api-gateway:
    build: ./api-gateway
    #el coordinator es quien recibe el tráfico externo
    environment:
      - PRODUCT_SERVICE_URL=http://product-service:4000
      - ORDER_SERVICE_URL=http://order-service:5000
      - REVIEW_SERVICE_URL=http://review-service:6000
      - AUTH_SERVICE_URL=http://auth-service:8080
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq:5672
      - REDIS_URL=redis://redis:6379
      - NODE_ROLE=active              
    depends_on:
      - product-service
      - order-service
      - notification-service
      - auth-service
      - rabbitmq
      - redis
    networks:
      - private-network


  api-gateway-spare:
    build: ./api-gateway
    environment:
      - PRODUCT_SERVICE_URL=http://product-service:4000
      - ORDER_SERVICE_URL=http://order-service:5000
      - REVIEW_SERVICE_URL=http://review-service:6000
      - AUTH_SERVICE_URL=http://auth-service:8080
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq:5672
      - REDIS_URL=redis://redis:6379
      - NODE_ROLE=spare
    depends_on:
      - product-service
      - order-service
      - auth-service
      - rabbitmq
      - redis
    networks:
      - private-network

  product-service:
    build: ./product-service
    depends_on:
      - postgres
    environment:
      - PORT=4000
      - DB_HOST=postgres
      - DB_USER=admin
      - DB_PASSWORD=admin
      - DB_NAME=giftshop
      - DB_PORT=5432
    networks:
      - private-network

  postgres:
    image: postgres:15
    container_name: products-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: giftshop
    volumes:
      - products_data:/var/lib/postgresql/data
    networks:
      - private-network

  order-service:
    build: ./order-service
    depends_on:
      - orders-postgres
      - rabbitmq
    environment:
      - DB_HOST=orders-postgres
      - DB_USER=admin
      - DB_PASSWORD=admin
      - DB_NAME=ordersdb
      - DB_PORT=5432
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq:5672
      - PORT=5000
    networks:
      - private-network

  orders-postgres:
    image: postgres:15
    container_name: orders-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: ordersdb
    volumes:
      - orders_data:/var/lib/postgresql/data
    networks:
      - private-network

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - coordinator
    networks:
      - public-network

  frontend-ssr:
    build:
      context: ./frontend-ssr
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8080
    ports:
      - "3001:3001"
    depends_on:
      - coordinator
    environment:
      - API_URL=http://coordinator:8080
    volumes:
      - ./frontend-ssr/public/uploads:/app/public/uploads
    networks:
      - public-network

  review-service:
    build: ./review-service
    depends_on:
      - mongo
    environment:
      - PORT=6000
      - MONGO_URI=mongodb://mongo:27017/reviewsdb
    networks:
      - private-network

  mongo:
    image: mongo:6
    container_name: reviews-mongo
    volumes:
      - reviews_data:/data/db
    networks:
      - private-network

  notification-service:
    build: ./notification-service
    ports:
      - "7000:7000"
    depends_on:
      - rabbitmq
      - redis
    environment:
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq:5672
      - REDIS_URL=redis://redis:6379
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
    networks:
      - private-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - private-network

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - private-network

  auth-service:
    build: ./auth-service
    container_name: auth-service
    depends_on:
      - auth-db
    environment:
      - PORT=8080
    networks:
      - private-network

  auth-db:
    image: postgres:15
    container_name: auth_db_container
    environment:
      POSTGRES_USER: user_auth
      POSTGRES_PASSWORD: password_segura
      POSTGRES_DB: auth_db
    volumes:
      - ./auth-service/databaseComponent/init.sql:/docker-entrypoint-initdb.d/init.sql
      - auth_data:/var/lib/postgresql/data
    networks:
      - private-network

# S1: Network Segmentation
# public-network  → frontend + coordinator (expuesto al exterior)
# private-network → coordinator + api-gateway + api-gateway-spare + microservicios + BDs
networks:
  public-network:
  private-network:

volumes:
  products_data:
  orders_data:
  reviews_data:
  rabbitmq_data:
  redis_data:
  auth_data:
