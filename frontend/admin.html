<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Boutique de Regalos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Lexend', sans-serif; }
    .font-alfa { font-family: 'Alfa Slab One', cursive; }
    input, textarea {
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #FBBF24;
      box-shadow: 0 0 0 3px rgba(251,191,36,0.2);
    }
  </style>
  <script src="admin.js" defer></script>
</head>

<body class="bg-pink-50 text-gray-800">

  <!-- Header igual al carrito/app -->
  <header class="bg-yellow-400 text-white text-center py-6 shadow-md relative">
    <a href="index.html"
      class="absolute left-6 top-1/2 -translate-y-1/2 bg-white text-yellow-500 px-4 py-2 rounded-lg shadow hover:bg-yellow-50 text-sm font-semibold">
      ← Tienda
    </a>
    <h1 class="text-3xl font-alfa">Panel del Admin</h1>
    <p class="text-lg">Boutique de Regalos Villapinzón</p>
  </header>

  <main class="max-w-5xl mx-auto p-6 space-y-10">

    <!-- Métricas -->
    <div class="grid grid-cols-2 gap-6">
      <div class="bg-white rounded-xl shadow p-6">
        <p class="text-gray-500 text-sm mb-1">Total Ventas</p>
        <p id="totalVentas" class="text-4xl font-bold text-green-500">$0</p>
      </div>
      <div class="bg-white rounded-xl shadow p-6">
        <p class="text-gray-500 text-sm mb-1">Número de Órdenes</p>
        <p id="numOrdenes" class="text-4xl font-bold text-yellow-400">0</p>
      </div>
    </div>

    <!-- Crear Producto -->
    <div>
      <h2 class="text-2xl font-alfa text-yellow-500 mb-4">Crear Producto</h2>
      <div class="bg-white rounded-xl shadow p-6 space-y-4">

        <input id="nombreProducto" type="text" placeholder="Nombre del producto"
          class="border border-gray-200 rounded-lg p-3 w-full bg-pink-50">

        <textarea id="descripcionProducto" placeholder="Descripción" rows="3"
          class="border border-gray-200 rounded-lg p-3 w-full bg-pink-50"></textarea>

        <div class="grid grid-cols-2 gap-4">
          <input id="precioProducto" type="number" placeholder="Precio"
            class="border border-gray-200 rounded-lg p-3 w-full bg-pink-50">

          <input id="stockProducto" type="number" placeholder="Stock disponible"
            class="border border-gray-200 rounded-lg p-3 w-full bg-pink-50">
        </div>

        <input id="imagen1" type="text" placeholder="Ruta imagen 1 (/Imagenes/...)"
          class="border border-gray-200 rounded-lg p-3 w-full bg-pink-50">

        <input id="imagen2" type="text" placeholder="Ruta imagen 2"
          class="border border-gray-200 rounded-lg p-3 w-full bg-pink-50">

        <input id="imagen3" type="text" placeholder="Ruta imagen 3"
          class="border border-gray-200 rounded-lg p-3 w-full bg-pink-50">

        <button onclick="crearProducto()"
          class="w-full bg-yellow-400 hover:bg-yellow-500 text-white font-semibold py-3 px-6 rounded-xl shadow transition">
          Crear producto ✨
        </button>

      </div>
    </div>

    <!-- Gestión de Productos -->
    <div>
      <h2 class="text-2xl font-alfa text-yellow-500 mb-4">Gestión de Productos</h2>
      <div id="listaProductos" class="space-y-4"></div>
    </div>

    <!-- Gráfica -->
    <div class="bg-white rounded-xl shadow p-6">
      <h2 class="text-xl font-alfa text-yellow-500 mb-4">Productos Vendidos</h2>
      <canvas id="graficaProductos"></canvas>
    </div>

    <!-- Tabla Órdenes -->
    <div class="bg-white rounded-xl shadow p-6">
      <h2 class="text-xl font-alfa text-yellow-500 mb-4">Órdenes</h2>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-yellow-50 text-yellow-600">
              <th class="p-3 text-left rounded-tl-lg">ID</th>
              <th class="p-3 text-left">Fecha</th>
              <th class="p-3 text-left rounded-tr-lg">Total</th>
            </tr>
          </thead>
          <tbody id="tablaOrdenes" class="divide-y divide-gray-100"></tbody>
        </table>
      </div>
    </div>

  </main>

  <footer class="bg-yellow-400 text-white text-center py-6 mt-10">
    <p>Contáctanos por
      <a href="https://wa.me/573005554942" class="text-green-700 font-semibold hover:underline">WhatsApp</a>
    </p>
  </footer>

</body>
</html>
