apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-config
  namespace: default
data:
  # RabbitMQ URL - Acceso a servicio en Docker Compose desde Minikube
  # En Minikube con Docker Desktop + WSL2, usamos host.docker.internal
  # En kind o caso local, puede ser localhost o la IP del host
  RABBITMQ_URL: "amqp://admin:admin@host.docker.internal:5672"
  
  # Redis URL
  REDIS_URL: "redis://host.docker.internal:6379"
  
  # SMTP no configurado - los correos se imprimirán en consola/logs
  # Si quieres habilitar correos reales, configura estas variables en un Secret
  SMTP_HOST: ""
  SMTP_PORT: ""
  SMTP_USER: ""
  SMTP_PASS: ""
  SMTP_FROM: ""
