apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: default
  labels:
    app: product-service
    tier: backend
spec:
  type: NodePort
  selector:
    app: product-service
  ports:
  - name: http
    port: 80
    targetPort: 4000
    protocol: TCP
    nodePort: 30001
  sessionAffinity: None
